---
# Source: doron-app/templates/service.yaml
kind: Service     
apiVersion: v1     
metadata:
  name: my-app-service #from RELEASE NAME
spec:
  selector:
    app: my-app
  type: ClusterIP
  ports:         
  - name: http   
    protocol: TCP
    port: 8000 #from Values
    targetPort: 8000  #from values
---
# Source: doron-app/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deploy
spec:
  selector: 
    matchLabels:
      app: my-app
  replicas: 2   #from values
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app #from values
        image: shalram/hello-newapp:3 #from values
        ports:
        - containerPort: 8000
